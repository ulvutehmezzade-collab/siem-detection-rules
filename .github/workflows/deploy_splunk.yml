name: Deploy Rules to Splunk

on:
  push:
    paths:
      - 'splunk/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Parse and Push savedsearches.conf to Splunk
        run: |
          CURRENT_SECTION=""
          SEARCH_QUERY=""
          CRON=""
          ENABLED=""
          ACTIONS=""
          WEBHOOK_URI=""
          
          while IFS= read -r line || [ -n "$line" ]; do
            line=$(echo "$line" | tr -d '\r' | xargs -0)
            
            if [[ "$line" =~ ^\[(.*)\]$ ]]; then
              if [ -n "$CURRENT_SECTION" ]; then
                echo "Deploying: $CURRENT_SECTION"
                
                # Əgər konfiqurasiyada xüsusi webhook yoxdursa, digər 15 qayda üçün default link yaradırıq (sirensiz)
                if [ -z "$WEBHOOK_URI" ]; then
                  WEBHOOK_URI="https://api.telegram.org/bot8976522214:AAFHTcRSp4z43y8WkP2XLPJF_HuNr8LjfEg/sendMessage?chat_id=-1004382963620&text=ALERT:+${CURRENT_SECTION}+Triggered!"
                fi
                
                curl -k -X POST "https://${{ secrets.SPLUNK_HOST }}:8089/servicesNS/nobody/search/saved/searches" \
                  -H "Authorization: Bearer ${{ secrets.SPLUNK_PASSWORD }}" \
                  -d name="$CURRENT_SECTION" \
                  --data-urlencode search="$SEARCH_QUERY" \
                  -d is_scheduled="$ENABLED" \
                  -d cron_schedule="$CRON" \
                  -d actions="$ACTIONS" \
                  --data-urlencode action.webhook.uri="$WEBHOOK_URI" \
                  -d alert_type="number of events" \
                  -d alert_comparator="greater than" \
                  -d alert_threshold="0" \
                  -d force_overwrite=true
              fi
              CURRENT_SECTION="${BASH_REMATCH[1]}"
              SEARCH_QUERY=""
              CRON=""
              ENABLED=""
              ACTIONS="webhook"
              WEBHOOK_URI=""
            elif [[ "$line" =~ ^search[[:space:]]*=[[[:space:]]*(.*)$ ]]; then
              SEARCH_QUERY="${BASH_REMATCH[1]}"
            elif [[ "$line" =~ ^cron_schedule[[:space:]]*=[[[:space:]]*(.*)$ ]]; then
              CRON="${BASH_REMATCH[1]}"
            elif [[ "$line" =~ ^enableSched[[:space:]]*=[[[:space:]]*(.*)$ ]]; then
              ENABLED="${BASH_REMATCH[1]}"
            elif [[ "$line" =~ ^action\.webhook\.uri[[:space:]]*=[[[:space:]]*(.*)$ ]]; then
              WEBHOOK_URI="${BASH_REMATCH[1]}"
            fi
          done < splunk/savedsearches.conf

          # Sonuncu blok üçün təkrar icra
          if [ -n "$CURRENT_SECTION" ]; then
            echo "Deploying: $CURRENT_SECTION"
            if [ -z "$WEBHOOK_URI" ]; then
              WEBHOOK_URI="https://api.telegram.org/bot8976522214:AAFHTcRSp4z43y8WkP2XLPJF_HuNr8LjfEg/sendMessage?chat_id=-1004382963620&text=ALERT:+${CURRENT_SECTION}+Triggered!"
            fi
            
            curl -k -X POST "https://${{ secrets.SPLUNK_HOST }}:8089/servicesNS/nobody/search/saved/searches" \
              -H "Authorization: Bearer ${{ secrets.SPLUNK_PASSWORD }}" \
              -d name="$CURRENT_SECTION" \
              --data-urlencode search="$SEARCH_QUERY" \
              -d is_scheduled="$ENABLED" \
              -d cron_schedule="$CRON" \
              -d actions="$ACTIONS" \
              --data-urlencode action.webhook.uri="$WEBHOOK_URI" \
              -d alert_type="number of events" \
              -d alert_comparator="greater than" \
              -d alert_threshold="0" \
              -d force_overwrite=true
          fi
