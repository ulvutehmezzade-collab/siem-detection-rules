[Rule_01_LSASS_Memory_Dump_Detection]
search = index=windows sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=10 TargetImage="*\\lsass.exe" (GrantedAccess="0x1010" OR GrantedAccess="0x1438" OR GrantedAccess="0x1fffff") | stats count min(_time) as first_seen max(_time) as last_seen by Computer, SourceImage, TargetImage, GrantedAccess
description = Detects potential credential dumping using tools like Mimikatz or procdump targeting LSASS process memory.
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 5

[Rule_02_Kerberoasting_Attack_TGS_Request]
search = index=windows sourcetype="XmlWinEventLog:Security" EventCode=4769 TicketOptions="0x40810010" TicketEncryptionType="0x17" ServiceName!="*$" | stats count by Computer, TargetUserName, ServiceName, IpAddress
description = Detects Kerberoasting activity via TGS request with weak RC4 encryption (0x17) targeting user accounts.
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 2
alert.track = 1
alert.severity = 4

[Rule_03_Pass_The_Hash_NTLM_Anomalous_Logon]
search = index=windows EventCode=4624 LogonType=3 AuthenticationPackageName=NTLM | search WorkstationName!="" NOT [ | inputlookup trusted_assets.csv | fields WorkstationName ]
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 4

[Rule_04_Malicious_PowerShell_EncodedCommand]
search = index=windows (sourcetype="XmlWinEventLog:Microsoft-Windows-PowerShell/Operational" EventCode=4104) OR (sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=1 Image="*\\powershell.exe") CommandLine IN ("*-enc*", "*-encodedcommand*", "*-nop*", "*-bypass*", "*-w hidden*") | stats count by Computer, User, CommandLine
description = Detects obfuscated or bypassed PowerShell executions commonly used by malware and threat actors.
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 4

[Rule_05_Persistence_via_Scheduled_Task_Creation]
search = index=windows sourcetype="XmlWinEventLog:Security" EventCode=4698 TaskContent IN ("*\\AppData\\Local\\Temp*", "*\\Users\\Public*", "*C:\\Windows\\Temp*", "*.bat*", "*.ps1*", "*.vbs*") | xmlkv TaskContent | stats count by Computer, SubjectUserName, TaskName, TaskContent
description = Detects creation of new scheduled tasks executing binaries out of suspicious user-writable directories.
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 3

[Rule_06_Brute_Force_Followed_by_Successful_Login]
search = index=windows sourcetype="XmlWinEventLog:Security" (EventCode=4625 OR EventCode=4624) | transaction TargetUserName, SourceNetworkAddress maxspan=15m single=false | search EventCode=4625 AND EventCode=4624 | where eventcount > 5
description = Correlates multiple failed login attempts followed by a successful authentication from the same IP within 15 minutes.
cron_schedule = */5 * * * *
dispatch.earliest_time = -20m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 5

